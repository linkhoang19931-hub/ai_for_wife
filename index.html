<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Knowledge Hub Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-main: #F9FAFB;
            --bg-card: #FFFFFF;
            --text-main: #111827;
            --text-sub: #6B7280;
            --border: #E5E7EB;
            --sidebar-bg: #FFFFFF;
            --accent-green: #10B981;
            --accent-orange: #F59E0B;
            --accent-purple: #8B5CF6;
        }

        body.dark-mode {
            --bg-main: #111827;
            --bg-card: #1F2937;
            --text-main: #F9FAFB;
            --text-sub: #9CA3AF;
            --border: #374151;
            --sidebar-bg: #111827;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Sidebar */
        aside {
            width: 280px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 10;
            overflow-y: auto;
        }

        .brand {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
        }

        .nav-group { margin-bottom: 20px; }
        .nav-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--text-sub); margin-bottom: 8px; display: block; }
        
        .btn-nav {
            width: 100%;
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-main);
            font-size: 0.85rem;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 2px;
            transition: all 0.2s;
        }
        .btn-nav:hover { background: rgba(0,0,0,0.05); }
        body.dark-mode .btn-nav:hover { background: rgba(255,255,255,0.05); }
        .btn-nav svg { width: 16px; height: 16px; stroke-width: 2; }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 24px 32px;
            gap: 20px;
            overflow: hidden;
            position: relative;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-right: 120px; /* Nhường chỗ cho đồng hồ */
        }

        .todo-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; padding: 4px 0; }
        .todo-item.done { text-decoration: line-through; color: var(--text-sub); }

        /* Editor Pro */
        .editor-header { display: flex; gap: 10px; margin-bottom: -1px; }
        .tab-btn {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-bottom: none;
            background: rgba(0,0,0,0.05);
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-sub);
        }
        .tab-btn.active {
            background: var(--bg-card);
            border-bottom: 1px solid var(--bg-card);
            color: var(--primary);
        }

        .editor-container {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 0 12px 12px 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #note-area, #preview-area { flex: 1; padding: 24px; font-size: 1rem; line-height: 1.6; overflow-y: auto; color: var(--text-main); }
        #note-area { border: none; resize: none; outline: none; background: transparent; }
        #preview-area { display: none; }

        .editor-footer {
            padding: 12px 24px;
            background: rgba(0,0,0,0.02);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            padding: 8px 20px;
            border-radius: 8px;
            border: none;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }

        /* Fixed Cat Clock in Top Right */
        .fixed-clock-container {
            position: absolute;
            top: 20px;
            right: 32px;
            width: 100px;
            height: 100px;
            z-index: 100;
        }

        /* Tối ưu CSS Đồng hồ Mèo */
        .c-clock { position: relative; width: 100%; height: 100%; scale: 0.8; }
        .c-clock__inner { 
            position: absolute; top: 10%; left: 10%; width: 80%; height: 80%;
            background: white; border: 2px solid #F27398; border-radius: 50%; z-index: 6; 
        }
        .c-clock__needle { 
            position: absolute; bottom: 50%; left: 50%; transform-origin: bottom center; 
            background: #333; border-radius: 2px; z-index: 10; 
        }
        #sec { width: 1px; height: 40%; background: #F27398; }
        #min { width: 2px; height: 35%; }
        #hour { width: 3px; height: 25%; }
        
        .c-cat__face { 
            position: absolute; top: -10%; left: 0; width: 100%; height: 80%;
            background: #9D9D9D; border-radius: 50%; z-index: 5;
        }
        .c-cat__ears { position: absolute; top: -25%; left: 0; width: 100%; height: 30%; z-index: 4; display: flex; justify-content: space-around; }
        .c-cat__ear { width: 30%; height: 100%; background: #9D9D9D; border-radius: 30% 30% 0 0; }

        .c-cat__eyes { position: absolute; top: 25%; left: 0; width: 100%; display: flex; justify-content: space-around; padding: 0 15%; box-sizing: border-box; }
        .c-cat__eye { width: 15px; height: 15px; background: #333; border-radius: 50%; position: relative; overflow: hidden; }
        .c-cat__eyelid { position: absolute; top: 0; left: 0; width: 100%; height: 0; background: #9D9D9D; transition: height 0.1s; }
        .c-cat__eyelid.blink { animation: blink-anim 0.2s; }
        @keyframes blink-anim { 0%, 100% { height: 0; } 50% { height: 100%; } }

        /* Focus Mode */
        body.focus-mode aside { display: none; }
        body.focus-mode main { padding: 40px 15%; }
        
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 9999;
        }
        body.dark-mode #loading-overlay { background: rgba(0,0,0,0.8); }
    </style>
</head>
<body>

    <div id="loading-overlay">Con mèo đang chạy...</div>

    <aside>
        <div class="brand">AI HUB PRO</div>

        <div class="nav-group">
            <span class="nav-label">Trò chuyện</span>
            <button class="btn-nav" onclick="openChat('https://chatgpt.com')">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                ChatGPT
            </button>
            <button class="btn-nav" onclick="openChat('https://gemini.google.com')">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                Gemini
            </button>
        </div>

        <div class="nav-group">
            <span class="nav-label">Kiến thức</span>
            <button class="btn-nav" onclick="selectFolder()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></svg>
                Thư mục lưu
            </button>
            <button class="btn-nav" onclick="loadFileForAI()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                Nạp file cho AI
            </button>
        </div>

        <div class="nav-group">
            <span class="nav-label">Việc cần làm</span>
            <div id="todo-list"></div>
            <button class="btn-nav" style="color: var(--primary);" onclick="addTodo()">+ Thêm việc</button>
        </div>

        <div class="nav-group" style="margin-top: auto;">
            <button class="btn-nav" onclick="toggleDarkMode()">🌓 Tối/Sáng</button>
            <button class="btn-nav" onclick="toggleFocusMode()">🧘 Tập trung</button>
            <button class="btn-nav" onclick="backupData()">💾 Sao lưu</button>
        </div>
    </aside>

    <main>
        <div class="fixed-clock-container">
            <div class="c-clock">
                <div class="c-cat__ears">
                    <div class="c-cat__ear"></div>
                    <div class="c-cat__ear"></div>
                </div>
                <div class="c-cat__face">
                    <div class="c-cat__eyes">
                        <div class="c-cat__eye"><div class="c-cat__eyelid" id="eyelid-l"></div></div>
                        <div class="c-cat__eye"><div class="c-cat__eyelid" id="eyelid-r"></div></div>
                    </div>
                </div>
                <div class="c-clock__inner">
                    <div class="c-clock__needle" id="hour"></div>
                    <div class="c-clock__needle" id="min"></div>
                    <div class="c-clock__needle" id="sec"></div>
                </div>
            </div>
        </div>

        <header>
            <div>
                <h1>Chào Vợ yêu!</h1>
                <p id="daily-quote" style="color: var(--text-sub); font-style: italic;"></p>
            </div>
        </header>

        <div class="editor-header">
            <button class="tab-btn active" id="tab-edit" onclick="switchTab('edit')">Soạn thảo</button>
            <button class="tab-btn" id="tab-preview" onclick="switchTab('preview')">Xem trước</button>
        </div>

        <div class="editor-container">
            <textarea id="note-area" placeholder="Ghi chú kiến thức tại đây..."></textarea>
            <div id="preview-area"></div>
            <div class="editor-footer">
                <span id="save-status" style="font-size: 0.8rem; color: var(--accent-green);">Đã lưu nháp</span>
                <button class="btn-primary" onclick="saveAsNewFile()">Lưu file mới</button>
            </div>
        </div>
    </main>

    <script>
        let todos = JSON.parse(localStorage.getItem('wife_todos') || '[]');
        let directoryHandle = null;

        window.onload = () => {
            if (localStorage.getItem('dark_mode') === 'true') document.body.classList.add('dark-mode');
            document.getElementById('note-area').value = localStorage.getItem('wife_ai_knowledge') || '';
            document.getElementById('daily-quote').innerText = "Chúc vợ một ngày làm việc thật hiệu quả và vui vẻ!";
            renderTodos();
            startClock();
        };

        function switchTab(mode) {
            const edit = document.getElementById('note-area'), preview = document.getElementById('preview-area');
            const bE = document.getElementById('tab-edit'), bP = document.getElementById('tab-preview');
            if(mode === 'preview') {
                preview.innerHTML = marked.parse(edit.value);
                edit.style.display = 'none'; preview.style.display = 'block';
                bP.classList.add('active'); bE.classList.remove('active');
            } else {
                edit.style.display = 'block'; preview.style.display = 'none';
                bE.classList.add('active'); bP.classList.remove('active');
            }
        }

        function renderTodos() {
            document.getElementById('todo-list').innerHTML = todos.map((t, i) => `
                <div class="todo-item ${t.done ? 'done' : ''}">
                    <input type="checkbox" ${t.done ? 'checked' : ''} onchange="todos[${i}].done=!todos[${i}].done;renderTodos()">
                    <span>${t.text}</span>
                </div>
            `).join('');
            localStorage.setItem('wife_todos', JSON.stringify(todos));
        }

        function addTodo() { 
            const text = prompt("Việc mới:"); 
            if(text) { todos.push({text, done:false}); renderTodos(); } 
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('dark_mode', document.body.classList.contains('dark-mode'));
        }

        function toggleFocusMode() { document.body.classList.toggle('focus-mode'); }

        async function selectFolder() { try { directoryHandle = await window.showDirectoryPicker(); } catch(e){} }

        async function saveAsNewFile() {
            if(!directoryHandle) return alert("Chọn thư mục lưu trước nhé!");
            const content = document.getElementById('note-area').value;
            let idx = parseInt(localStorage.getItem('last_idx') || '0') + 1;
            const h = await directoryHandle.getFileHandle(`kienthuc_${idx}.md`, {create:true});
            const w = await h.createWritable(); await w.write(content); await w.close();
            localStorage.setItem('last_idx', idx);
            alert("Đã lưu kienthuc_" + idx + ".md");
        }

        async function loadFileForAI() {
            try {
                const hs = await window.showOpenFilePicker({multiple:true});
                let c = "";
                for(const h of hs) { const f = await h.getFile(); c += `[${f.name}]\n${await f.text()}\n\n`; }
                navigator.clipboard.writeText(c);
                alert("Đã copy toàn bộ file để dán vào AI!");
            } catch(e){}
        }

        function backupData() {
            const blob = new Blob([JSON.stringify({notes:document.getElementById('note-area').value, todos})], {type:'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download='backup.json'; a.click();
        }

        document.getElementById('note-area').oninput = (e) => localStorage.setItem('wife_ai_knowledge', e.target.value);

        function startClock() {
            setInterval(() => {
                const now = new Date();
                const s = now.getSeconds(), m = now.getMinutes(), h = now.getHours();
                document.getElementById('sec').style.transform = `rotate(${s*6}deg)`;
                document.getElementById('min').style.transform = `rotate(${m*6}deg)`;
                document.getElementById('hour').style.transform = `rotate(${(h%12)*30 + m*0.5}deg)`;
                if(s % 10 === 0) {
                    document.getElementById('eyelid-l').classList.add('blink');
                    document.getElementById('eyelid-r').classList.add('blink');
                    setTimeout(() => {
                        document.getElementById('eyelid-l').classList.remove('blink');
                        document.getElementById('eyelid-r').classList.remove('blink');
                    }, 200);
                }
            }, 1000);
        }

        function openChat(url) { window.open(url, '_blank', 'width=1000,height=800'); }
    </script>
</body>
</html>
