<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lawyer Intelligence Hub Pro</title>
    
    <!-- Fonts & Libraries -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Project Styles -->
    <link rel="stylesheet" href="src/css/style.css">
    <link rel="stylesheet" href="src/css/cat-clock.css">
</head>
<body>

    <aside>
        <div class="brand">⚖️ LAW HUB PRO</div>
        <div class="nav-group">
            <span class="nav-label">Trò chuyện AI</span>
            <button class="btn-nav" onclick="openChat('https://chatgpt.com')">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> 
                ChatGPT
            </button>
            <button class="btn-nav" onclick="openChat('https://gemini.google.com')">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg> 
                Gemini
            </button>
        </div>
        <div class="nav-group">
            <span class="nav-label">Hồ sơ & Kiến thức</span>
            <button class="btn-nav" onclick="selectFolder()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></svg> 
                Thư mục lưu
            </button>
            <button class="btn-nav" onclick="loadFileForAI()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> 
                Nạp hồ sơ vào AI
            </button>
        </div>
        <div class="nav-group">
            <span class="nav-label">Việc cần làm</span>
            <div id="todo-list"></div>
            <button class="btn-nav" style="color: var(--primary); font-size: 0.75rem;" onclick="addTodo()">+ Thêm việc mới</button>
        </div>
        <div class="nav-group" style="margin-top: auto;">
            <button class="btn-nav" onclick="toggleDarkMode()">🌓 Tối/Sáng</button>
            <button class="btn-nav" onclick="toggleFocusMode()">🧘 Tập trung</button>
        </div>
    </aside>

    <main>
        <div class="cat-clock-pos">
            <div class="clock-scale-wrapper">
                <div class="clock">
                    <div class="clock__inner">
                        <ul class="clock__nums"><li class="clock__num clock__num--12"><span class="clock__num__text">12</span></li></ul>
                        <div class="clock__needles">
                            <div class="clock__needle clock__needle--hour" id="hour"></div>
                            <div class="clock__needle clock__needle--min" id="min"></div>
                            <div class="clock__needle clock__needle--sec" id="sec"></div>
                        </div>
                    </div>
                    <div class="cat">
                        <div class="cat__ears"><div class="cat__ears__ear cat__ears__ear--left"></div><div class="cat__ears__ear cat__ears__ear--right"></div></div>
                        <div class="cat__face">
                            <div class="cat__face__pattern cat__face__pattern--top"></div>
                            <div class="cat__face__pattern cat__face__pattern--left"></div>
                            <div class="cat__face__pattern cat__face__pattern--right"></div>
                            <div class="cat__eyes">
                                <div class="cat__eyes__eye cat__eyes__eye--left"><div class="cat__eyes__eyelid eyelid-left"></div><span></span></div>
                                <div class="cat__eyes__eye cat__eyes__eye--right"><div class="cat__eyes__eyelid eyelid-right"></div><span></span></div>
                            </div>
                            <div class="cat__nose"></div>
                            <div class="cat__mouth"></div>
                        </div>
                        <div class="cat__tail"><div class="cat__tail__inner"></div></div>
                    </div>
                </div>
            </div>
        </div>

        <header>
            <h1>Chào Vợ yêu!</h1>
            <p style="color: var(--text-sub); font-style: italic;">Luật sư hôm nay cần hỗ trợ gì không ạ?</p>
        </header>

        <div class="editor-header">
            <button class="tab-btn active" id="tab-edit" onclick="switchTab('edit')">Soạn thảo</button>
            <button class="tab-btn" id="tab-preview" onclick="switchTab('preview')">Xem trước</button>
            <button class="tab-btn" id="tab-law" onclick="switchTab('law')">📜 Văn bản mới</button>
        </div>

        <div class="editor-container">
            <textarea id="note-area" placeholder="Ghi chú hồ sơ... (Hỗ trợ Markdown)"></textarea>
            <div id="preview-area"></div>
            <div id="law-area">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                    <h2>Văn bản mới nhất (Radar TVPL)</h2>
                    <button class="btn-primary" onclick="fetchLegalDocs()" style="padding: 5px 12px; font-size: 0.75rem;">Quét lại radar</button>
                </div>
                <div id="law-list">Đang tải dữ liệu...</div>
                <div id="debug-log" class="debug-log"></div>
            </div>
            <div class="editor-footer">
                <span style="font-size:0.8rem; color:var(--text-sub);">Auto-save: ON</span>
                <button class="btn-primary" onclick="saveAsNewFile()">Lưu Hồ Sơ (.md)</button>
            </div>
        </div>
    </main>

    <button id="exit-focus" class="btn-primary" onclick="toggleFocusMode()">Thoát chế độ tập trung 🧘</button>

    <!-- App Logic -->
    <script src="src/js/main.js"></script>
</body>
</html>
